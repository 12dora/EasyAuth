services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: easyauth
      POSTGRES_USER: easyauth
      POSTGRES_PASSWORD: ${EASYAUTH_POSTGRES_PASSWORD:?请在环境或 .env 中设置 EASYAUTH_POSTGRES_PASSWORD}
    ports:
      # 只在回环地址发布, 不把数据库暴露到所有网卡。
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      # 只在回环地址发布无认证 Redis。
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
