name: Build Docker image

# Builds a multi-architecture EasyAuth image and publishes it to the GitHub Container
# Registry (GHCR):
#   - linux/amd64  → Linux x86-64
#   - linux/arm64  → Apple Silicon / ARM (e.g. Docker Desktop on an ARM Mac)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Releases on version tags
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # On a version tag (vX.Y.Z), publish a GitHub Release that links to the
      # multi-arch image in GHCR (Packages). No large binaries are attached.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: EasyAuth ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## EasyAuth ${{ github.ref_name }}

            Multi-architecture container image (`linux/amd64` · `linux/arm64`),
            published to the GitHub Container Registry — see the repository **Packages** tab.

            **Pull:**
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/easyauth:${{ steps.meta.outputs.version }}
            # immutable, by digest:
            docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/easyauth@${{ steps.build.outputs.digest }}
            ```

            | | |
            | --- | --- |
            | Image | `${{ env.REGISTRY }}/${{ github.repository_owner }}/easyauth:${{ steps.meta.outputs.version }}` |
            | Digest | `${{ steps.build.outputs.digest }}` |
            | Platforms | `linux/amd64`, `linux/arm64` |

            Configure and run per the [README](https://github.com/${{ github.repository }}#configuration-reference).
