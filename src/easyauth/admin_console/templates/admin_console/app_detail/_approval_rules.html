<div class="console-panel">
  <h2>ApprovalRule</h2>
  {% if can_manage %}
    <form method="post" class="compact-form">
      {% csrf_token %}
      <input type="hidden" name="action" value="create_approval_rule">
      <label>
        Role
        <select name="approval_role_id" required>
          {% for role in roles %}
            <option value="{{ role.id }}">{{ role.key }}</option>
          {% endfor %}
        </select>
      </label>
      <label>审批人 userid <input name="approver_userids" required></label>
      <button type="submit" class="primary">新增 ApprovalRule</button>
    </form>
  {% endif %}
</div>
