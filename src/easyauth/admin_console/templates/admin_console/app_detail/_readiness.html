<div class="console-panel">
  <h2>配置完整性</h2>
  <p class="muted">状态：{{ readiness.status }}</p>
  {% if readiness.issues %}
    <ul class="issue-list">
      {% for issue in readiness.issues %}
        <li>
          <code>{{ issue.code }}</code>
          {% if issue.subject %}<strong>{{ issue.subject }}</strong>{% endif %}
          {{ issue.message }}
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>ready</p>
  {% endif %}
</div>
