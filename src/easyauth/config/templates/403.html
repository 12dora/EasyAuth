{% load static %}
<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>无权访问控制台 - EasyAuth</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
      --faint: #94a3b8;
      --line: #e2e8f0;
      --brand: #2563eb;
      --brand-strong: #1d4ed8;
      --radius-tight: 2px;
      font-family: "Geist", "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    * { box-sizing: border-box; }
    body { min-width: 320px; min-height: 100vh; margin: 0; background: var(--bg); }
    a { color: inherit; text-decoration: none; }
    .topbar { position: sticky; top: 0; border-bottom: 1px solid var(--line); background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(8px); }
    .topbar-inner { display: flex; align-items: center; justify-content: space-between; width: min(1440px, 100%); height: 56px; margin: 0 auto; padding: 0 20px; }
    .brand { display: flex; align-items: center; min-width: 0; gap: 12px; }
    .brand-logo { display: block; width: auto; height: 36px; flex: 0 0 auto; object-fit: contain; }
    .brand-copy { display: grid; min-width: 0; gap: 2px; }
    .brand-copy strong { overflow: hidden; font-size: 16px; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
    .brand-copy span { color: var(--faint); font-size: 12px; }
    .error-main { display: grid; align-items: center; width: min(960px, 100%); min-height: calc(100vh - 56px); margin: 0 auto; padding: 56px 20px 72px; }
    .error-copy { display: grid; gap: 18px; max-width: 560px; }
    .eyebrow { margin: 0; color: var(--brand); font-size: 13px; font-weight: 700; }
    h1 { margin: 0; font-size: clamp(34px, 7vw, 68px); line-height: 1; letter-spacing: 0; }
    .description { max-width: 520px; margin: 0; color: var(--muted); font-size: 16px; line-height: 1.7; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
    .button { display: inline-flex; align-items: center; justify-content: center; min-height: 38px; padding: 8px 14px; border: 1px solid var(--line); border-radius: var(--radius-tight); background: #ffffff; color: var(--muted); font-size: 14px; font-weight: 700; transition: background-color 150ms ease-out, border-color 150ms ease-out, color 150ms ease-out; }
    button.button { font-family: inherit; cursor: pointer; }
    .actions form { display: contents; }
    .button-primary { border-color: var(--brand); background: var(--brand); color: #ffffff; }
    .button:hover { border-color: var(--brand-strong); color: var(--ink); }
    .button-primary:hover { background: var(--brand-strong); color: #ffffff; }
    @media (max-width: 640px) {
      .topbar-inner { padding: 0 16px; }
      .brand-copy span { display: none; }
      .error-main { padding: 40px 16px 56px; }
      .actions { display: grid; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/portal/" aria-label="EasyAuth 员工门户">
        <img class="brand-logo" src="{% static 'easyauth/frontend/assets/brand/jiefa_logo.webp' %}" alt="">
        <span class="brand-copy">
          <strong>EasyAuth</strong>
          <span>统一权限与授权门户</span>
        </span>
      </a>
    </div>
  </header>
  <main class="error-main">
    <section class="error-copy" aria-labelledby="forbidden-title">
      <p class="eyebrow">403</p>
      <h1 id="forbidden-title">无权访问控制台</h1>
      <p class="description">当前账号不是 EasyAuth 控制台管理员，不能进入管理控制台。你可以返回员工门户继续申请或查看权限。</p>
      <div class="actions">
        <a class="button button-primary" href="/portal/">返回门户</a>
        {# 登出视图是 @require_POST, 普通链接的 GET 会 405, 必须走表单. #}
        <form action="/auth/logout/" method="post">
          {% csrf_token %}
          <button class="button" type="submit">退出登录</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
