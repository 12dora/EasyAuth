{% load static %}
<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>页面没有找到 - EasyAuth</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --bg-deep: #f8fafc;
      --surface: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
      --faint: #94a3b8;
      --line: #e2e8f0;
      --brand: #2563eb;
      --brand-strong: #1d4ed8;
      --radius: 6px;
      --radius-tight: 2px;
      font-family: "Geist", "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    * { box-sizing: border-box; }

    body {
      min-width: 320px;
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: inherit; text-decoration: none; }

    .topbar {
      position: sticky;
      top: 0;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(1440px, 100%);
      height: 56px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 12px;
    }

    .brand-logo {
      display: block;
      width: auto;
      height: 36px;
      flex: 0 0 auto;
      object-fit: contain;
    }

    .brand-copy {
      display: grid;
      min-width: 0;
      gap: 2px;
    }

    .brand-copy strong {
      overflow: hidden;
      font-size: 16px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-copy span {
      color: var(--faint);
      font-size: 12px;
    }

    .not-found-main {
      display: grid;
      align-items: center;
      width: min(960px, 100%);
      min-height: calc(100vh - 56px);
      margin: 0 auto;
      padding: 56px 20px 72px;
    }

    .not-found-copy {
      display: grid;
      gap: 18px;
      max-width: 560px;
    }

    .eyebrow {
      margin: 0;
      color: var(--brand);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 68px);
      line-height: 1;
      letter-spacing: 0;
    }

    .description {
      max-width: 520px;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-tight);
      background: var(--surface);
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      transition: background-color 150ms ease-out, border-color 150ms ease-out, color 150ms ease-out;
    }

    .button-primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #ffffff;
    }

    .button:hover {
      border-color: var(--brand-strong);
      color: var(--ink);
    }

    .button-primary:hover {
      background: var(--brand-strong);
      color: #ffffff;
    }

    @media (max-width: 640px) {
      .topbar-inner { padding: 0 16px; }
      .brand-copy span { display: none; }
      .not-found-main { padding: 40px 16px 56px; }
      .actions { display: grid; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/portal/" aria-label="EasyAuth 员工门户">
        <img class="brand-logo" src="{% static 'easyauth/frontend/assets/brand/jiefa_logo.webp' %}" alt="">
        <span class="brand-copy">
          <strong>EasyAuth</strong>
          <span>统一权限与授权门户</span>
        </span>
      </a>
    </div>
  </header>
  <main class="not-found-main">
    <section class="not-found-copy" aria-labelledby="not-found-title">
      <p class="eyebrow">404</p>
      <h1 id="not-found-title">页面没有找到</h1>
      <p class="description">这个入口不存在，或你当前的登录状态没有访问它的权限。你可以回到员工门户，也可以重新登录后继续。</p>
      <div class="actions">
        <a class="button button-primary" href="/auth/login/?next=/portal/">重新登录</a>
        <a class="button" href="/portal/">返回门户</a>
      </div>
    </section>
  </main>
</body>
</html>
